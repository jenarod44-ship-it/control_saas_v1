{% extends "control/base.html" %}

{% block content %}

<h2>Registrar incidencia</h2>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="card shadow-sm">
    <div class="card-body">

        <p><strong>Empresa activa:</strong> {{ empresa.nombre }}</p>
        <p><strong>Empleados disponibles:</strong> {{ empleados.count }}</p>

        <form method="post">
            {% csrf_token %}

            <label>Empleado</label>
            <select name="empleado" class="form-control mb-2" required>
                <option value="">Seleccione empleado</option>

                {% for empleado in empleados %}
                    <option value="{{ empleado.id }}">
                        {{ empleado.numero_empleado }} - {{ empleado.nombre }}
                    </option>
                {% endfor %}
            </select>

            <label>Tipo</label>
            <select name="tipo" class="form-control mb-2" required>
                <option value="PERMISO">Permiso</option>
                <option value="VACACIONES">Vacaciones</option>
                <option value="INCAPACIDAD">Incapacidad</option>
                <option value="DESCANSO">Descanso</option>
            </select>

            <label>Fecha inicio</label>
            <input type="date" name="fecha_inicio" class="form-control mb-2" required>

            <label>Fecha fin</label>
            <input type="date" name="fecha_fin" class="form-control mb-3" required>

            <button type="submit" class="btn btn-primary">
                Guardar
            </button>

            <a href="{% url 'nucleo:lista_incidencias' %}" class="btn btn-secondary">
                Volver
            </a>
        </form>

    </div>
</div>

{% endblock %}
