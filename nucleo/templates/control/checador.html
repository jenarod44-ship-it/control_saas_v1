<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reloj Checador</title>
</head>

<body style="background:#0f172a; color:white; text-align:center; font-family:Arial;">

<!-- RELOJ -->
<div id="reloj" style="
    font-size:70px;
    font-weight:bold;
    margin-top:40px;
">
</div>

<div id="fecha" style="
    font-size:20px;
    color:#94a3b8;
    margin-bottom:40px;
">
</div>

<h2>Registro de Asistencia</h2>

<form method="post">
    {% csrf_token %}

    <label>Número de empleado</label><br><br>

    <input type="text" name="numero_empleado" required
        style="font-size:20px; padding:10px; width:250px; text-align:center;"><br><br>

    <button type="submit"
        style="font-size:20px; padding:10px 30px; background:#22c55e; color:white;">
        CHECAR
    </button>
</form>

{% if mensaje %}
<div style="
    margin-top:30px;
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
">
    {{ mensaje }}
</div>
{% endif %}

<a href="/dashboard/" style="
    display:block;
    margin-top:40px;
    color:#94a3b8;
    font-size:18px;
    text-decoration:none;
">
    ← Volver al Panel
</a>

<!-- SCRIPT RELOJ -->
<script>
function actualizarReloj() {
    const ahora = new Date();

    const hora = ahora.toLocaleTimeString();
    const fecha = ahora.toLocaleDateString('es-MX', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });

    document.getElementById("reloj").innerHTML = hora;
    document.getElementById("fecha").innerHTML = fecha;
}

setInterval(actualizarReloj, 1000);
actualizarReloj();
</script>

</body>
</html>
