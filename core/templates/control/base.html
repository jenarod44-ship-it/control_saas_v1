<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control SaaS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #1f2937;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover {
            background: #374151;
            display: block;
            padding-left: 10px;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<!-- 🔥 NAVBAR (AQUÍ VA ARRIBA, NO ABAJO) -->
<nav class="navbar navbar-dark bg-dark px-3 d-flex justify-content-between align-items-center">

    <!-- IZQUIERDA -->
    <span class="navbar-brand mb-0 h5">
        <i class="bi bi-building"></i> Sistema de Asistencia
    </span>

    <!-- CENTRO -->
    <div class="text-white">
        <i class="bi bi-clock"></i>
        <span id="reloj"></span>
    </div>

    <!-- DERECHA -->
    <div>
        <select class="form-select form-select-sm"
                onchange="window.location.href=this.value;">

            {% for eu in request.user.empresausuario_set.all %}
                <option value="{% url 'core:cambiar_empresa' eu.empresa.id %}"
                    {% if request.empresa and eu.empresa.id == request.empresa.id %}
                        selected
                    {% endif %}
                >
                    {{ eu.empresa.nombre }}
                </option>
            {% endfor %}

        </select>
    </div>

</nav>

<div class="container-fluid">
    <div class="row">
        
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h4>Control SaaS</h4>
            <hr>
            <p>{{ request.user.username }}</p>

            <ul>

                <li>
                    <a href="{% url 'core:dashboard' %}">Dashboard</a>
                </li>

                <li>
                    <a href="{% url 'asistencia:checador' %}">Checador</a>
                </li>

            </ul>

            <a href="/admin/">Administración</a><br><br>
            
            <a href="{% url 'movimientos:movimientos_lista' %}">Movimientos</a><br>

            <hr>

            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button class="btn btn-link text-white p-0">Cerrar sesión</button>
            </form>
        </div>

        <!-- Contenido -->
        <div class="col-md-10 p-4">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function actualizarReloj() {
    let ahora = new Date()

    let horas = String(ahora.getHours()).padStart(2,"0")
    let minutos = String(ahora.getMinutes()).padStart(2,"0")
    let segundos = String(ahora.getSeconds()).padStart(2,"0")

    document.getElementById("reloj").innerHTML =
        horas + ":" + minutos + ":" + segundos
}

setInterval(actualizarReloj,1000)
</script>

</body>
</html>
