<h2>PLANTILLA CORRECTA DE INCIDENCIAS</h2>
<nav style="margin-bottom:15px; font-size:14px;">
<a href="{% url 'core:dashboard' %}">Panel de Control</a> /
<strong>Reporte de Incidencias</strong>
</nav>

<a href="{% url 'reportes:incidencias_excel' %}?inicio={{ request.GET.inicio }}&fin={{ request.GET.fin }}&empleado={{ request.GET.empleado }}">
Exportar Excel
</a>

<h1>Incidencias</h1>

<form method="get" style="margin-bottom:20px;">

<label>Fecha inicio:</label>
<input type="date" name="inicio" value="{{ request.GET.inicio }}">

<label>Fecha fin:</label>
<input type="date" name="fin" value="{{ request.GET.fin }}">

<label>Empleado:</label>
<select name="empleado">

    <option value="">Todos</option>

    {% for e in empleados %}
    <option value="{{ e.id }}"
        {% if empleado_id == e.id|stringformat:"s" %}selected{% endif %}>
        {{ e.numero_empleado }} - {{ e.nombre }}
    </option>
    {% endfor %}

</select>

<button type="submit">Filtrar</button>

</form>

<table border="1">

<tr>
<th>No.</th>
<th>Empleado</th>
<th>Tipo</th>
<th>Inicio</th>
<th>Fin</th>
</tr>

{% for i in incidencias %}

<tr>
<td>{{ i.id }}</td>
<td>{{ i.empleado.nombre }}</td>
<td>{{ i.tipo }}</td>
<td>{{ i.fecha_inicio }}</td>
<td>{{ i.fecha_fin }}</td>
</tr>

{% endfor %}

</table>
