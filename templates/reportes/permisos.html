
<h2>Reporte de Permisos</h2>

<form method="get" class="mb-3">

    <div class="d-flex justify-content-between mb-3">

    <a href="{% url 'core:dashboard' %}" class="btn btn-secondary">
        ← Panel
    </a>

    <h4>Reporte de Permisos</h4>

</div>

<label>Inicio:</label>
<input type="date" name="inicio" value="{{ request.GET.inicio }}">

<label>Fin:</label>
<input type="date" name="fin" value="{{ request.GET.fin }}">

<label>Empleado:</label>
<select name="empleado">
    <option value="">Todos</option>

    {% for e in empleados %}
    <option value="{{ e.id }}"
    {% if request.GET.empleado == e.id|stringformat:"s" %}selected{% endif %}>
        {{ e.nombre }}
    </option>
    {% endfor %}
</select>

<button type="submit">Filtrar</button>

</form>

<a href="{% url 'reportes:permisos_excel' %}?{{ request.GET.urlencode }}" 
   class="btn btn-success mb-3">
    ⬇ Exportar a Excel
</a>

<form method="get">

    <select name="empleado">
        <option value="">Todos</option>
        {% for e in empleados %}
            <option value="{{ e.id }}"
                {% if empleado_id == e.id|stringformat:"s" %}selected{% endif %}>
                {{ e.numero_empleado }} — {{ e.nombre }}
            </option>
        {% endfor %}
    </select>

    <input type="date" name="inicio" value="{{ inicio }}">
    <input type="date" name="fin" value="{{ fin }}">

    <button type="submit">Filtrar</button>

</form>

<table border="1" class="table table-striped">

<thead>
<tr>
    <th>Empleado</th>
    <th>Fecha</th>
    <th>Salida</th>
    <th>Regreso</th>
</tr>
</thead>

<tbody>

{% for r in resultados %}
<tr>
    <td>{{ r.empleado }}</td>
    <td>{{ r.fecha }}</td>
    <td>{{ r.salida|default:"--" }}</td>
    <td>{{ r.regreso|default:"--" }}</td>
</tr>

{% empty %}
<tr>
    <td colspan="4">Sin registros</td>
</tr>
{% endfor %}

</tbody>
</table>
