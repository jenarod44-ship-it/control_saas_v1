<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Tiempo Extra</title>
</head>

<body style="background:#020617; color:white; text-align:center; font-family:Arial;">

    <div id="reloj" style="
    font-size:40px;
    font-weight:bold;
    margin-top:20px;
">
</div>

<h1>Registro de Tiempo Extra</h1>

<form method="post">
    {% csrf_token %}

    <input type="text" name="numero_empleado" placeholder="Número de empleado"
        style="font-size:20px; padding:10px;"><br><br>

    <button type="submit"
        style="font-size:20px; padding:10px 30px; background:#f59e0b;">
        REGISTRAR
    </button>
</form>

{% if mensaje %}
<p style="margin-top:20px; font-size:22px;">{{ mensaje }}</p>
{% endif %}

<a href="/dashboard/" style="display:block; margin-top:40px;">
    ← Volver
</a>

<script>
function actualizarReloj() {
    const ahora = new Date();
    const hora = ahora.toLocaleTimeString();
    document.getElementById("reloj").innerHTML = hora;
}

setInterval(actualizarReloj, 1000);
actualizarReloj();
</script>

</body>
</html>
